# Liên kết cùng Supabase project với app user:
#   supabase login
#   supabase link --project-ref <YOUR_PROJECT_REF>
#
# Triển khai function dashboard:
#   supabase secrets set ADMIN_EMAILS=admin@example.com
#   supabase functions deploy admin-dashboard-stats
#   supabase functions deploy admin-data
#   supabase functions deploy admin-config

project_id = "link-with-supabase-cli"

[functions.admin-dashboard-stats]
verify_jwt = false

[functions.admin-data]
verify_jwt = false

[functions.admin-config]
verify_jwt = false
